<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT Proxy Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #111; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
header { padding: 16px 20px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 16px; font-weight: 600; color: #a78bfa; }
header .status { font-size: 12px; padding: 3px 10px; border-radius: 99px; background: #222; color: #888; }
header .status.online { background: #065f46; color: #6ee7b7; }
header .status.offline { background: #7f1d1d; color: #fca5a5; }
#chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
.msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: #1f2937; color: #e0e0e0; border-bottom-left-radius: 4px; }
.msg.system { align-self: center; background: #1a1a2e; color: #888; font-size: 12px; padding: 6px 12px; }
.msg .label { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: 0.6; }
.msg .thinking { color: #888; font-style: italic; }
.input-area { padding: 16px 20px; background: #1a1a2e; border-top: 1px solid #333; display: flex; gap: 10px; }
.input-area textarea { flex: 1; background: #222; color: #e0e0e0; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 44px; max-height: 120px; }
.input-area textarea:focus { border-color: #a78bfa; }
.input-area button { background: #a78bfa; color: #111; border: none; border-radius: 8px; padding: 10px 20px; font-weight: 600; cursor: pointer; font-size: 14px; transition: .15s; }
.input-area button:hover { background: #c4b5fd; }
.input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1>ChatGPT Proxy</h1>
  <span class="status" id="status">verificando...</span>
</header>
<div id="chat">
  <div class="msg system">Proxy em http://localhost:9225/v1/chat/completions</div>
</div>
<div class="input-area">
  <textarea id="input" rows="1" placeholder="Digite sua mensagem..." enterkeyhint="send"></textarea>
  <button id="send">Enviar</button>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const PROXY = 'http://localhost:9225/v1/chat/completions';

async function checkStatus() {
  try {
    const r = await fetch('http://localhost:9225/v1/models', { signal: AbortSignal.timeout(3000) });
    if (r.ok) { statusEl.textContent = 'online'; statusEl.className = 'status online'; }
    else throw new Error();
  } catch {
    statusEl.textContent = 'offline'; statusEl.className = 'status offline';
  }
}
checkStatus();
setInterval(checkStatus, 5000);

function addMsg(role, content, extra = '') {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="label">${role === 'user' ? 'Você' : 'ChatGPT'}</div><span>${escapeHtml(content)}</span>${extra}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  sendBtn.disabled = true;
  sendBtn.textContent = '...';

  const thinkingDiv = document.createElement('div');
  thinkingDiv.className = 'msg assistant';
  thinkingDiv.innerHTML = '<div class="label">ChatGPT</div><span class="thinking">pensando...</span>';
  chat.appendChild(thinkingDiv);
  chat.scrollTop = chat.scrollHeight;

  try {
    const r = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'chatgpt-web',
        messages: [{ role: 'user', content: text }],
        stream: false,
      }),
      signal: AbortSignal.timeout(120000),
    });
    const data = await r.json();
    const reply = data?.choices?.[0]?.message?.content || '⚠️ Resposta vazia';
    thinkingDiv.innerHTML = `<div class="label">ChatGPT</div><span>${escapeHtml(reply)}</span>`;
  } catch (err) {
    thinkingDiv.innerHTML = `<div class="label">ChatGPT</div><span style="color:#f87171">Erro: ${escapeHtml(err.message)}</span>`;
  }
  chat.scrollTop = chat.scrollHeight;
  sendBtn.disabled = false;
  sendBtn.textContent = 'Enviar';
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
